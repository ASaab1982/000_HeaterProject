<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boiler Control Center</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 50px; }
        .container { background: #1e1e1e; border: 2px solid #333; border-radius: 15px; padding: 25px; width: 500px; margin-bottom: 20px; }
        h2 { text-align: center; color: #ff5722; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #777; font-size: 0.9em; text-transform: uppercase; }
        .val { font-family: monospace; color: #4caf50; font-weight: bold; font-size: 1.1em; }
        .online { border-color: #4caf50; }
        .hidden { display: none; }
        .footer { text-align: center; font-size: 0.8em; color: #777; margin-top: 20px; }
        
        /* Simple Login Styles */
        .login-box { background: #1e1e1e; border: 2px solid #333; border-radius: 15px; padding: 40px; width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #333; border: 1px solid #444; color: white; border-radius: 5px; }
        button { width: 97%; padding: 10px; background: #ff5722; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e64a19; }
    </style>
</head>
<body>

    <div id="login-section" class="login-box">
        <h2>Secure Access</h2>
        <input type="text" id="user-input" placeholder="Username">
        <input type="password" id="pass-input" placeholder="Password">
        <button onclick="attemptLogin()">Login</button>
        <p id="error-msg" style="color: #ff5722; font-size: 0.8em; margin-top: 10px;"></p>
    </div>

    <div class="container hidden" id="boiler-card">
        <button onclick="attemptLogout()" style="float: right; background: #d32f2f; margin-top: -10px; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Logout</button>
        <h2>Boiler: <span id="boiler-id-display">--</span></h2>
        <table>
            <thead>
                <tr>
                    <th>Sensor / Metric</th>
                    <th>Current Value</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>DHT Temperature</td><td class="val"><span id="dhtTempC">--</span> °C</td></tr>
                <tr><td>DHT Humidity</td><td class="val"><span id="dhtHumidity">--</span> %</td></tr>
                <tr><td>Thermistor Temp</td><td class="val"><span id="thermistorTempC">--</span> °C</td></tr>
                <tr><td>DC Motor Speed</td><td class="val"><span id="dcMotorSpeed">--</span></td></tr>
                <tr><td>Stepper Angle</td><td class="val"><span id="stepperAngleDeg">--</span> °</td></tr>
                <tr><td>Servo Position</td><td class="val"><span id="servoPositionDeg">--</span> °</td></tr>
                <tr><td>Mic ADC Level</td><td class="val"><span id="micAdc">--</span></td></tr>
                <tr><td>Touch Sensor</td><td class="val"><span id="touched">--</span></td></tr>
                <tr><td>System Health</td><td class="val"><span id="systemHealth">--</span></td></tr>
            </tbody>
        </table>
        
        <div class="footer">
            Last Update: <span id="time-val">Never</span> | Logged in as: <span id="logged-in-user"></span>
        </div>
    </div>

    <!-- Include the Socket.io client library -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const loginSection = document.getElementById('login-section');
        const boilerCard = document.getElementById('boiler-card');
        const errorMsg = document.getElementById('error-msg');
        
        function attemptLogin() {
            const username = document.getElementById('user-input').value;
            const password = document.getElementById('pass-input').value;
            socket.emit('login', { username, password });
        }

        // Handle response from server
        socket.on('loginResponse', (res) => {
            if (res.success) {
                loginSection.classList.add('hidden');
                boilerCard.classList.remove('hidden');
                errorMsg.innerText = ''; // Clear any previous error messages
                document.getElementById('logged-in-user').innerText = document.getElementById('user-input').value;
            } else {
                errorMsg.innerText = res.message;
            }
        });

        function attemptLogout() {
            // For a client-side logout, we simply hide the dashboard and show the login form.
            // A more robust solution would involve sending a 'logout' event to the server
            // to invalidate the session or remove the socket from authorized rooms.
            boilerCard.classList.add('hidden');
            loginSection.classList.remove('hidden');
            document.getElementById('user-input').value = ''; // Clear username
            document.getElementById('pass-input').value = ''; // Clear password
            errorMsg.innerText = ''; // Clear any error messages
        }

        // Listen for the 'boilerUpdate' event from the server
        socket.on('boilerUpdate', (data) => {
            console.log('Received data:', data);

            // Update the UI elements
            document.getElementById('boiler-id-display').innerText = data.boilerId || 'Unknown';
            document.getElementById('dhtTempC').innerText = data.dhtTempC ?? '--';
            document.getElementById('dhtHumidity').innerText = data.dhtHumidity ?? '--';
            document.getElementById('thermistorTempC').innerText = data.thermistorTempC ?? '--';
            document.getElementById('dcMotorSpeed').innerText = data.dcMotorSpeed ?? '--';
            document.getElementById('stepperAngleDeg').innerText = data.stepperAngleDeg ?? '--';
            document.getElementById('servoPositionDeg').innerText = data.servoPositionDeg ?? '--';
            document.getElementById('micAdc').innerText = data.micAdc ?? '--';
            document.getElementById('touched').innerText = data.touched ? "TOUCHED" : "OFF";
            
            const healthHex = "0x" + Number(data.systemHealth || 0).toString(16).toUpperCase();
            document.getElementById('systemHealth').innerText = healthHex;

            // Add a timestamp
            const now = new Date();
            document.getElementById('time-val').innerText = now.toLocaleTimeString();

            // Visual feedback: blink the card green on update
            const card = document.getElementById('boiler-card');
            card.classList.add('online');
            setTimeout(() => card.classList.remove('online'), 500);
        });

        socket.on('connect', () => console.log('Connected to Server Bridge!'));
    </script>
</body>
</html>
